<main class="container">
  <h1>{{ title }}</h1>

  <p class="description">Dữ liệu này được gõ cứng.</p>

  <table class="erp-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Tên Nhân Viên</th>
        <th>Chức Vụ</th>
      </tr>
    </thead>
    <tbody>
      @for (nv of danhSach; track nv.id) {
      <tr [class]="
          nv.role === 'Backend Developer' ? 'role-backend' :
          nv.role === 'Frontend Developer' ? 'role-frontend' :
          nv.role === 'AI Engineer' ? 'role-ai' : ''
        ">
        <td>{{ nv.id }}</td>
        <td class="name-column">{{ nv.ten }}</td>
        <td>{{ nv.role }}</td>
      </tr>
      }
    </tbody>
  </table>
</main>
